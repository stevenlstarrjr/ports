name = "libwacom"
version = "latest"
summary = "Library to identify Wacom tablets and load tablet data files"
license = "MIT"

deps = ["libevdev", "systemd"]

install_mode = "store"

[build]
system = "make"

[scripts]
build = "build.sh"
install = "install.sh"

[src]
type = "git"
url = "https://github.com/linuxwacom/libwacom.git"
