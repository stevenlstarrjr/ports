name = "libclc"
version = "latest"
summary = "OpenCL C builtins library for LLVM/Clang"
license = "Apache-2.0 WITH LLVM-exception"

deps = ["llvm", "llvm-spirv", "spirv-tools", "spirv-headers"]

install_mode = "store"

[build]
system = "make"

[scripts]
build = "build.sh"
install = "install.sh"

[src]
type = "git"
url = "https://github.com/llvm/llvm-project.git"
