name = "libwebp"
version = "latest"
summary = "WebP image codec"
license = "BSD-3-Clause"

deps = ["jpeg-turbo", "libpng", "giflib"]

install_mode = "store"

[build]
system = "make"

[scripts]
build = "build.sh"
install = "install.sh"

[src]
type = "git"
url = "https://chromium.googlesource.com/webm/libwebp"

